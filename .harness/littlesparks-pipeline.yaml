pipeline:
  name: LittleSparks Deploy
  identifier: littlesparks_deploy
  projectIdentifier: default_project
  orgIdentifier: default
  tags:
    app: littlesparks
    platform: gcp
  properties:
    ci:
      codebase:
        connectorRef: account.Github_OAuth
        repoName: sjswamy1417/littlesparks
        build:
          type: branch
          spec:
            branch: <+input>.default(main)

  stages:
    # ════════════════════════════════════════════════════
    # Stage 1: Build & Test
    # ════════════════════════════════════════════════════
    - stage:
        name: Build and Test
        identifier: build_and_test
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: install_deps
                  spec:
                    shell: Sh
                    command: |
                      npm ci

              - parallel:
                  - step:
                      type: Run
                      name: Lint
                      identifier: lint
                      spec:
                        shell: Sh
                        command: |
                          npm run lint

                  - step:
                      type: Run
                      name: TypeScript Check
                      identifier: typecheck
                      spec:
                        shell: Sh
                        command: |
                          npx tsc --noEmit

              - step:
                  type: Run
                  name: Unit Tests
                  identifier: unit_tests
                  spec:
                    shell: Sh
                    command: |
                      npm run test -- --reporter=junit --outputFile=test-results/results.xml || true
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - "test-results/*.xml"

    # ════════════════════════════════════════════════════
    # Stage 2: Build Docker Images via Cloud Build
    # ════════════════════════════════════════════════════
    - stage:
        name: Build Images
        identifier: build_images
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Build and Push via Cloud Build
                  identifier: cloud_build
                  spec:
                    shell: Sh
                    envVariables:
                      GCP_PROJECT_ID: <+pipeline.variables.gcp_project_id>
                      GCP_REGION: <+pipeline.variables.gcp_region>
                      IMAGE_TAG: <+codebase.shortCommitSha>
                    command: |
                      REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/littlesparks"

                      echo "Building app image via Cloud Build..."
                      gcloud builds submit \
                        --project="${GCP_PROJECT_ID}" \
                        --tag="${REGISTRY}/app:${IMAGE_TAG}" \
                        --gcs-log-dir="gs://${GCP_PROJECT_ID}_cloudbuild/logs" \
                        --timeout=1200s \
                        -q \
                        --dockerfile=docker/Dockerfile \
                        .

                      echo "Tagging as latest..."
                      gcloud artifacts docker tags add \
                        "${REGISTRY}/app:${IMAGE_TAG}" \
                        "${REGISTRY}/app:latest" \
                        --quiet

                      echo "Building worker image via Cloud Build..."
                      gcloud builds submit \
                        --project="${GCP_PROJECT_ID}" \
                        --tag="${REGISTRY}/worker:${IMAGE_TAG}" \
                        --gcs-log-dir="gs://${GCP_PROJECT_ID}_cloudbuild/logs" \
                        --timeout=1200s \
                        -q \
                        --dockerfile=docker/Dockerfile.worker \
                        .

                      gcloud artifacts docker tags add \
                        "${REGISTRY}/worker:${IMAGE_TAG}" \
                        "${REGISTRY}/worker:latest" \
                        --quiet

                      echo "Images pushed:"
                      echo "  ${REGISTRY}/app:${IMAGE_TAG}"
                      echo "  ${REGISTRY}/worker:${IMAGE_TAG}"

    # ════════════════════════════════════════════════════
    # Stage 3: Run Database Migrations
    # ════════════════════════════════════════════════════
    - stage:
        name: Run Migrations
        identifier: run_migrations
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Prisma Migrate Deploy
                  identifier: prisma_migrate
                  spec:
                    shell: Sh
                    envVariables:
                      GCP_PROJECT_ID: <+pipeline.variables.gcp_project_id>
                      GCP_REGION: <+pipeline.variables.gcp_region>
                      IMAGE_TAG: <+codebase.shortCommitSha>
                    command: |
                      REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/littlesparks"

                      # Create or update the migration job
                      gcloud run jobs update littlesparks-migrate \
                        --image="${REGISTRY}/app:${IMAGE_TAG}" \
                        --region="${GCP_REGION}" \
                        --project="${GCP_PROJECT_ID}" \
                        --quiet 2>/dev/null || \
                      gcloud run jobs create littlesparks-migrate \
                        --image="${REGISTRY}/app:${IMAGE_TAG}" \
                        --region="${GCP_REGION}" \
                        --project="${GCP_PROJECT_ID}" \
                        --set-cloudsql-instances="${GCP_PROJECT_ID}:${GCP_REGION}:littlesparks-db" \
                        --set-secrets="DATABASE_URL=littlesparks-database-url:latest" \
                        --service-account="littlesparks-sa@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
                        --command="npx" \
                        --args="prisma,migrate,deploy" \
                        --max-retries=1 \
                        --quiet

                      echo "Running migration..."
                      gcloud run jobs execute littlesparks-migrate \
                        --region="${GCP_REGION}" \
                        --project="${GCP_PROJECT_ID}" \
                        --wait \
                        --quiet

                      echo "Migration complete."

    # ════════════════════════════════════════════════════
    # Stage 4: Deploy to Cloud Run
    # ════════════════════════════════════════════════════
    - stage:
        name: Deploy to Cloud Run
        identifier: deploy_cloudrun
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Deploy Service
                  identifier: deploy_service
                  spec:
                    shell: Sh
                    envVariables:
                      GCP_PROJECT_ID: <+pipeline.variables.gcp_project_id>
                      GCP_REGION: <+pipeline.variables.gcp_region>
                      IMAGE_TAG: <+codebase.shortCommitSha>
                    command: |
                      # Substitute variables into service.yaml
                      sed \
                        -e "s|PROJECT_ID|${GCP_PROJECT_ID}|g" \
                        -e "s|REGION|${GCP_REGION}|g" \
                        -e "s|:latest|:${IMAGE_TAG}|g" \
                        gcp/service.yaml > /tmp/littlesparks-service.yaml

                      echo "Deploying Cloud Run service..."
                      gcloud run services replace /tmp/littlesparks-service.yaml \
                        --region="${GCP_REGION}" \
                        --project="${GCP_PROJECT_ID}" \
                        --quiet

                      # Allow public access
                      gcloud run services add-iam-policy-binding littlesparks \
                        --region="${GCP_REGION}" \
                        --project="${GCP_PROJECT_ID}" \
                        --member="allUsers" \
                        --role="roles/run.invoker" \
                        --quiet

                      SERVICE_URL=$(gcloud run services describe littlesparks \
                        --region="${GCP_REGION}" \
                        --project="${GCP_PROJECT_ID}" \
                        --format="value(status.url)")

                      echo "Deployed to: ${SERVICE_URL}"

              - step:
                  type: Run
                  name: Health Check
                  identifier: health_check
                  spec:
                    shell: Sh
                    envVariables:
                      GCP_PROJECT_ID: <+pipeline.variables.gcp_project_id>
                      GCP_REGION: <+pipeline.variables.gcp_region>
                    command: |
                      SERVICE_URL=$(gcloud run services describe littlesparks \
                        --region="${GCP_REGION}" \
                        --project="${GCP_PROJECT_ID}" \
                        --format="value(status.url)")

                      echo "Health checking ${SERVICE_URL}/api/health ..."

                      for i in 1 2 3 4 5 6; do
                        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/api/health" || true)
                        if [ "$STATUS" = "200" ]; then
                          echo "Health check passed!"
                          curl -s "${SERVICE_URL}/api/health"
                          exit 0
                        fi
                        echo "Attempt $i: status=$STATUS, retrying in 10s..."
                        sleep 10
                      done

                      echo "Health check failed after 6 attempts"
                      exit 1

  # ════════════════════════════════════════════════════
  # Pipeline Variables
  # ════════════════════════════════════════════════════
  variables:
    - name: gcp_project_id
      type: String
      description: GCP Project ID
      required: true
      default: project-0ddfb2d3-8c78-4896-9a8
      value: <+input>.default(project-0ddfb2d3-8c78-4896-9a8)
    - name: gcp_region
      type: String
      description: GCP Region
      required: true
      default: asia-south1
      value: <+input>.default(asia-south1)
